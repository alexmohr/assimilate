name: Coverage Diff Check
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: write

jobs:
  coverage-diff:
    name: Check coverage diff
    runs-on: ubuntu-latest
    if: github.event.workflow_run.pull_requests[0] != null
    steps:
      - name: Checkout scripts from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts

      - name: Locate coverage runs
        id: runs
        uses: actions/github-script@v7
        with:
          script: |
            async function latestRun(extra) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "ci.yml",
                ...extra,
              });
              return data.workflow_runs.sort(
                (a, b) => new Date(b.created_at) - new Date(a.created_at),
              )[0];
            }
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const prRun = await latestRun({ head_sha: context.payload.workflow_run.head_sha });
            const mainRun = await latestRun({
              branch: context.payload.repository.default_branch,
              event: "push",
              status: "success",
            });
            if (!prRun) core.setFailed("No CI run found for this PR's head commit.");
            if (!mainRun) core.setFailed("No successful CI run found on the default branch.");
            core.setOutput("pr_number", prNumber);
            core.setOutput("pr_run_id", prRun ? prRun.id : "");
            core.setOutput("main_run_id", mainRun ? mainRun.id : "");

      # continue-on-error: the artifact legitimately won't exist for a PR/main
      # run that predates this workflow (or any run before ci.yml gained the
      # coverage-final upload) - analyze-coverage-diff.js skips the check
      # gracefully when either file is missing rather than failing the job.
      - name: Download PR coverage
        if: steps.runs.outputs.pr_run_id
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-final
          run-id: ${{ steps.runs.outputs.pr_run_id }}
          path: pr-coverage
          github-token: ${{ github.token }}

      - name: Download main coverage baseline
        if: steps.runs.outputs.main_run_id
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-final
          run-id: ${{ steps.runs.outputs.main_run_id }}
          path: main-coverage
          github-token: ${{ github.token }}

      - name: Analyze coverage diff and update PR
        uses: actions/github-script@v7
        with:
          script: |
            const analyze = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/analyze-coverage-diff.js`);
            await analyze({
              github,
              context,
              core,
              prNumber: Number("${{ steps.runs.outputs.pr_number }}"),
              prLcovPath: `${process.env.GITHUB_WORKSPACE}/pr-coverage/final.info`,
              baseLcovPath: `${process.env.GITHUB_WORKSPACE}/main-coverage/final.info`,
            });
