name: PR Status Labels & Merge Gate
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  # write (not just read): sync-pr-labels.js squash-merges a PR itself once
  # it computes `ready to merge` plus a genuine approval - both the merge
  # commit and the post-merge branch deletion need contents:write, not just
  # pull-requests:write. Safe on this pull_request_target trigger the same
  # way pull-requests:write already was: this workflow only ever checks out
  # trusted scripts from the default branch (sparse-checkout .github/scripts
  # below), never the PR's own untrusted code.
  contents: write
  pull-requests: write
  actions: read
  checks: write

jobs:
  sync-labels:
    name: Sync PR status labels
    runs-on: ubuntu-latest
    # labeled/unlabeled only matters for the claude-approved / claude-changes-requested
    # review-verdict labels and needs human review (see sync-pr-labels.js) -
    # otherwise every status label this workflow itself adds/removes would
    # re-trigger it. needs human review specifically must be in this list: a
    # human removing it is the only sign-off mechanism
    # (humanSignOffStillStands() in sync-pr-labels.js), and without an
    # immediate re-sync here that removal sits invisible - reflected nowhere
    # - until some unrelated trigger happens to fire next, which may be
    # never on an otherwise-idle PR.
    if: >-
      (github.event_name != 'workflow_run' || github.event.workflow_run.pull_requests[0] != null) && (github.event.action != 'labeled' && github.event.action != 'unlabeled' ||
       contains(fromJSON('["claude-approved","claude-changes-requested","needs human review"]'), github.event.label.name))
    steps:
      - name: Checkout scripts from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let number = null;
            if (context.eventName === "workflow_run") {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length > 0) number = prs[0].number;
            } else {
              number = context.payload.pull_request.number;
            }
            core.setOutput("number", number ?? "");
      - name: Sync labels
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const sync = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/sync-pr-labels.js`);
            // selfCheckNames excludes this exact job (still "in progress" -
            // it's the one calling this) from sync-pr-labels.js's own
            // ready-to-merge completeness check, so it isn't mistaken for a
            // stalled check.
            await sync({
              github,
              context,
              core,
              prNumber: Number("${{ steps.pr.outputs.number }}"),
              eventAction: context.payload.action,
              selfCheckNames: ["Sync PR status labels"],
            });
