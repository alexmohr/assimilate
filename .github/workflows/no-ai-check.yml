name: No AI Check
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, edited]
jobs:
  no-ai-banners:
    if: github.actor != 'dependabot[bot]'
    name: No AI Banners
    runs-on: ubuntu-latest
    env:
      AI_TOOLS: 'claude|copilot|chatgpt|openai|anthropic|gemini|cursor|codeium|tabnine|amazon.?q|codewhisperer|devin|aider|cody|continue\.dev'
      # The repository's own agent account may author commits on PRs opened
      # by the repository owner.
      AGENT_LOGIN: 'alexmohr-agent'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # No --depth here: the checkout step above already did a full
            # (fetch-depth: 0) fetch. Re-fetching main with --depth=1 grafts
            # its tip as a shallow boundary, which truncates the ancestry
            # git needs to correctly resolve origin/main..HEAD and can pull
            # in commits already merged into main (e.g. old dependabot
            # commits) as if they were new to this PR.
            git fetch origin "${{ github.base_ref }}"
            echo "range=origin/${{ github.base_ref }}..HEAD" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "range=-1" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Check commits for AI banners
        run: |
          COMMITS=$(git log "${{ steps.range.outputs.range }}" --format=%B)
          AI_PATTERN="co-authored-by:.*($AI_TOOLS)|generated (with|by).*($AI_TOOLS)|claude-session:|claude\.ai/code|github\.com/features/copilot|aider\.chat"
          if echo "$COMMITS" | grep -iEq "$AI_PATTERN"; then
            echo "AI banner found in commit messages:"
            echo "$COMMITS" | grep -iE "$AI_PATTERN"
            exit 1
          fi
          echo "No AI banners found in commits."
      - name: Check commit authors for AI tools
        run: |
          AUTHOR_INFO=$(git log "${{ steps.range.outputs.range }}" --format='%an|%ae')
          AI_AUTHOR_PATTERN="$AI_TOOLS|\[bot\]|noreply@anthropic\.com|github-copilot"
          if echo "$AUTHOR_INFO" | grep -iEq "$AI_AUTHOR_PATTERN"; then
            echo "AI tool detected as commit author:"
            echo "$AUTHOR_INFO" | grep -iE "$AI_AUTHOR_PATTERN"
            exit 1
          fi
          echo "No AI tools found as commit authors."
      - name: Verify commit authors match PR opener
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          COMMIT_LOGINS=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits?per_page=100" \
            --paginate \
            --jq '.[].author.login // empty')
          MISMATCHED=$(echo "$COMMIT_LOGINS" | grep -vE "^(${PR_AUTHOR}|${AGENT_LOGIN})$" | grep -v "^$" || true)
          if [ -n "$MISMATCHED" ]; then
            echo "Commits authored by a different GitHub account than PR opener '$PR_AUTHOR':"
            echo "$MISMATCHED"
            exit 1
          fi
          echo "All linked commits authored by PR opener '$PR_AUTHOR'."
      - name: Check PR description for AI banners
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          AI_PATTERN="co-authored-by:.*($AI_TOOLS)|generated (with|by).*($AI_TOOLS)|claude-session:|claude\.ai/code|github\.com/features/copilot|aider\.chat"
          if echo "$PR_BODY" | grep -iEq "$AI_PATTERN"; then
            echo "AI banner found in PR description:"
            echo "$PR_BODY" | grep -iE "$AI_PATTERN"
            exit 1
          fi
          echo "No AI banners found in PR description."
