name: CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
env:
  CARGO_TERM_COLOR: always
jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: borg
          POSTGRES_USER: borg
          POSTGRES_PASSWORD: borg_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borg -d borg" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt, clippy
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres
      - name: Check formatting
        run: >
          cargo +nightly fmt -- --config error_on_unformatted=true,error_on_line_overflow=true,format_strings=true,group_imports=StdExternalCrate,imports_granularity=Crate #magic___^_^___line
      - name: Clippy
        run: cargo +nightly clippy --workspace -- -D warnings
      - name: Tests
        run: cargo test --workspace --lib --bins
      - name: Check sqlx offline cache is fresh
        run: cargo sqlx prepare --check --workspace
        env:
          DATABASE_URL: postgres://borg:borg_secret@localhost:5432/borg
      - name: Check generated TypeScript files are in sync
        run: git diff --exit-code frontend/src/types/generated/
  frontend:
    name: Frontend (fmt + lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Check formatting
        run: npm run format:check
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Unit tests
        run: npm run test
        working-directory: frontend
      - name: Check for security vulnerabilities
        run: |
          ALLOWLIST=$(node -e "const a=require('./.npm-audit-allowlist.json').audit;console.log(a.join(','))")
          if [ -n "$ALLOWLIST" ]; then
            npm audit --audit-level=moderate --omit=dev || {
              FOUND=$(npm audit --json --omit=dev | node -e "
                const allowed='${ALLOWLIST}'.split(',').filter(Boolean);
                const data=require('fs').readFileSync('/dev/stdin','utf8');
                const json=JSON.parse(data);
                const vulns=Object.keys(json.vulnerabilities||{}).filter(v=>!allowed.includes(v));
                if(vulns.length){console.error('Unallowed vulnerabilities: '+vulns.join(', '));process.exit(1);}
              ")
            }
          else
            npm audit --audit-level=moderate --omit=dev
          fi
        working-directory: frontend
      - name: Check for deprecated packages
        run: |
          node -e "
            const lock = require('./package-lock.json');
            const allowlist = require('./.npm-audit-allowlist.json').deprecated;
            const deps = Object.entries(lock.packages || {})
              .filter(([k, v]) => v.deprecated && k !== '')
              .map(([k]) => k.replace('node_modules/', ''))
              .filter(k => !allowlist.includes(k));
            if (deps.length) {
              console.error('Deprecated packages found (not in allowlist):');
              deps.forEach(d => console.error('  - ' + d));
              process.exit(1);
            }
            console.log('No unallowed deprecated packages found.');
          "
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
  db-integration:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: borg
          POSTGRES_USER: borg
          POSTGRES_PASSWORD: borg_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borg -d borg" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres
      - name: Run database integration tests
        env:
          DATABASE_URL: postgres://borg:borg_secret@localhost:5432/borg
        run: cargo +nightly test -p server --test db_queries
      - name: Run ignored integration tests
        env:
          DATABASE_URL: postgres://borg:borg_secret@localhost:5432/borg
        run: cargo +nightly test -p server --test integration -- --ignored --test-threads=1
      - name: Run ignored library tests (require database)
        env:
          DATABASE_URL: postgres://borg:borg_secret@localhost:5432/borg
        run: cargo +nightly test -p server --lib -- --ignored --test-threads=1
  nightly-tests:
    name: Nightly Tests (no coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: borg
          POSTGRES_USER: borg
          POSTGRES_PASSWORD: borg_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borg -d borg" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres
      - name: Run tests (unit + integration) on nightly
        env:
          DATABASE_URL: postgres://borg:borg_secret@localhost:5432/borg
        run: cargo +nightly test --workspace -- --test-threads=1
  docs:
    name: Documentation (mkdocs build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r docs/requirements.txt
      - name: Build docs (strict)
        run: mkdocs build --strict
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: borg
          POSTGRES_USER: borg
          POSTGRES_PASSWORD: borg_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U borg -d borg" --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --locked --no-default-features --features postgres
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Generate Rust coverage
        env:
          DATABASE_URL: postgres://borg:borg_secret@localhost:5432/borg
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info -- --include-ignored --test-threads=1
      - name: Generate frontend coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Merge coverage files
        run: |
          sed 's|^SF:|SF:frontend/|' frontend/coverage/lcov.info > frontend-lcov-fixed.info
          cat lcov.info frontend-lcov-fixed.info > merged.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: merged.info
          retention-days: 1

  coveralls-finish:
    name: Coveralls Finish
    runs-on: ubuntu-latest
    needs: [coverage, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: unit-coverage
      - uses: actions/download-artifact@v4
        with:
          name: e2e-coverage
          path: e2e
      - name: Merge and upload coverage
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          lcov --add-tracefile merged.info \
            --add-tracefile e2e/merged-e2e.info \
            --output-file final.info \
            --ignore-errors inconsistent
      - uses: coverallsapp/github-action@v2
        with:
          file: final.info
          format: lcov

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [frontend]
    env:
      COMPOSE_FILES: -f .devcontainer/demo/docker-compose.demo.yml -f .devcontainer/demo/docker-compose.coverage-override.yml
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Rust stable (for backend coverage processing)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96
          components: llvm-tools-preview
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npm run e2e:install
        working-directory: frontend
      - name: Build frontend with Istanbul instrumentation
        run: npm run build
        working-directory: frontend
        env:
          VITE_COVERAGE: "true"
      - name: Prepare coverage directories
        run: mkdir -p .coverage frontend/.nyc_output
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build demo image (GitHub Actions build cache)
        run: |
          # Build a single image tagged as both :coverage and :local.
          # The coverage-override.yml points the demo service at :coverage
          # (instrumented server binary); all agent/placeholder services use
          # :local but only execute /app/agent, so they are unaffected by
          # whether the server binary is instrumented.
          # A second COVERAGE=false build would break the Docker layer-cache
          # chain at the ARG COVERAGE declaration, forcing cargo build --release
          # to run twice for no gain.
          docker buildx build \
            --file .devcontainer/demo/Dockerfile.demo \
            --build-arg COVERAGE=true \
            --cache-from type=gha,scope=demo-e2e \
            --cache-to type=gha,mode=max,scope=demo-e2e \
            --load \
            --tag assimilate-demo:coverage \
            --tag assimilate-demo:local \
            .
      - name: Start demo environment (with instrumented frontend)
        run: |
          docker compose $COMPOSE_FILES up -d
          echo "Waiting for demo seed to complete (up to 40 min)..."
          DEMO_READY=false
          for i in $(seq 1 480); do
            if docker compose $COMPOSE_FILES logs demo 2>&1 | grep -q "Demo ready:"; then
              echo "Demo is seeded and ready"
              DEMO_READY=true
              break
            fi
            CONTAINER_ID=$(docker compose $COMPOSE_FILES ps -qa demo 2>/dev/null | head -1)
            if [ -n "$CONTAINER_ID" ]; then
              STATE=$(docker inspect --format '{{.State.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "unknown")
              if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
                echo "ERROR: Demo container stopped unexpectedly (state: $STATE)"
                docker logs "$CONTAINER_ID" --tail 100
                exit 1
              fi
            fi
            sleep 5
          done
          if [ "$DEMO_READY" != "true" ]; then
            echo "ERROR: Timed out waiting for demo to be ready"
            CONTAINER_ID=$(docker compose $COMPOSE_FILES ps -qa demo 2>/dev/null | head -1)
            [ -n "$CONTAINER_ID" ] && docker logs "$CONTAINER_ID" --tail 100
            exit 1
          fi
      - name: Run Playwright tests
        run: |
          set +e
          npm run e2e
          PW_EXIT=$?
          node -e "
            const fs = require('fs');
            const path = 'test-results.json';
            if (!fs.existsSync(path)) {
              console.error('ERROR: No test results found - Playwright likely crashed');
              process.exit(1);
            }
            const r = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (r.stats.flaky > 0) {
              console.error('ERROR: ' + r.stats.flaky + ' flaky test(s) - treated as failure');
              process.exit(1);
            }
            if (r.stats.unexpected > 0) {
              console.error('ERROR: ' + r.stats.unexpected + ' test(s) failed');
              process.exit(1);
            }
            console.log('All ' + r.stats.expected + ' tests passed.');
          "
          CHECK_EXIT=$?
          exit $(( PW_EXIT > CHECK_EXIT ? PW_EXIT : CHECK_EXIT ))
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
          VITE_COVERAGE: "true"
      - name: Generate frontend e2e coverage report
        run: npx nyc report --reporter=lcov --report-dir=coverage-e2e --temp-dir=.nyc_output
        working-directory: frontend
      - name: Collect backend coverage from Docker
        run: |
          # Stop agents with --timeout 30 so LLVM atexit handlers can flush profraw files
          # before docker sends SIGKILL. Also drops WebSocket connections so the server
          # shuts down cleanly without waiting for open connections.
          docker compose $COMPOSE_FILES stop --timeout 30 \
            web-server-01 db-server-01 media-store-01 \
            old-webserver legacy-db-prod \
            2>/dev/null || true
          sleep 2
          # Stop the demo container with SIGTERM and up to 30s for graceful shutdown.
          # This sends SIGTERM to start-demo.sh (PID 1), whose trap forwards it to the
          # server subprocess. The server's shutdown_signal() catches it via tokio,
          # drains connections, calls tunnel_manager.shutdown(), and exits main() cleanly.
          # LLVM's atexit handlers then flush coverage data to the bind-mounted .coverage/
          # before the process exits. docker compose stop waits for the container to fully
          # stop (or times out after 30s and sends SIGKILL).
          docker compose $COMPOSE_FILES stop demo --timeout 30 2>/dev/null || true
          # Copy server binary from the stopped demo container for llvm-cov.
          DEMO_CONTAINER=$(docker compose $COMPOSE_FILES ps -qa demo 2>/dev/null | head -1)
          if [ -n "$DEMO_CONTAINER" ]; then
            docker cp "$DEMO_CONTAINER":/app/server .coverage/server 2>/dev/null || true
          else
            echo "Demo container not found, skipping server binary copy"
          fi
          # Copy agent binary from one of the stopped agent containers for llvm-cov.
          AGENT_CONTAINER=$(docker compose $COMPOSE_FILES ps -qa web-server-01 2>/dev/null | head -1)
          if [ -n "$AGENT_CONTAINER" ]; then
            docker cp "$AGENT_CONTAINER":/app/agent .coverage/agent 2>/dev/null || true
          else
            echo "Agent container not found, skipping agent binary copy"
          fi
          echo "=== Debug: Coverage directory contents ==="
          ls -la .coverage/ || echo "coverage directory empty"
      - name: Process backend coverage
        run: |
          set -x
          if [ ! -f .coverage/server.profraw ] || [ ! -f .coverage/server ] || [ ! -f .coverage/agent ]; then
            echo "ERROR: No backend coverage data found"
            echo "=== Debug: Coverage directory ==="
            ls -la .coverage/ 2>/dev/null || echo "no coverage directory"
            exit 1
          fi

          # Use the same Rust image that built the coverage-instrumented binary.
          # NOTE: sh -c script is SINGLE-QUOTED so $() and $VAR are evaluated
          # inside the container, not on the CI runner.
          docker run --rm \
            -v "$(pwd)/.coverage:/coverage" \
            rust:1.96 \
            sh -c '
              set -e
              rustup component add llvm-tools
              SYSROOT=$(rustc --print sysroot)
              LLVM_PROFDATA=$SYSROOT/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-profdata
              LLVM_COV=$SYSROOT/lib/rustlib/x86_64-unknown-linux-gnu/bin/llvm-cov
              echo "=== Profraw files found ==="
              find /coverage -name "*.profraw" | xargs ls -la
              echo "=== Running llvm-profdata merge ==="
              find /coverage -name "*.profraw" | xargs $LLVM_PROFDATA merge -sparse -o /coverage/docker.profdata 2>&1
              echo "=== Running llvm-cov export ==="
              $LLVM_COV export -format=lcov \
                /coverage/server \
                --object /coverage/agent \
                -instr-profile=/coverage/docker.profdata \
                --ignore-filename-regex="/usr/local/cargo|/usr/local/rustup" \
                > /coverage/backend-e2e-raw.info
            '

          WORKSPACE=$(pwd)
          sed "s|SF:/src/|SF:${WORKSPACE}/|g" .coverage/backend-e2e-raw.info > backend-e2e.info

          sudo apt-get update && sudo apt-get install -y lcov

          if [ -f frontend/coverage-e2e/lcov.info ]; then
            lcov --add-tracefile backend-e2e.info \
              --add-tracefile frontend/coverage-e2e/lcov.info \
              --output-file merged-e2e.info \
              --ignore-errors inconsistent
          else
            cp backend-e2e.info merged-e2e.info
          fi

          echo "Backend + frontend e2e coverage merged successfully"
      - name: Upload e2e coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage
          path: merged-e2e.info
          retention-days: 1
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
      - name: Stop services
        if: always()
        run: docker compose $COMPOSE_FILES down -v
  build-agent:
    name: Build Agent (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute agent version
        id: version
        run: |
          FULL_VERSION=$(grep '^version = ' crates/agent/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(printf '%s' "$FULL_VERSION" | cut -d. -f1)
          MINOR=$(printf '%s' "$FULL_VERSION" | cut -d. -f2)
          VERSION_COMMIT=$(git log -1 --pretty=format:"%H" -S "version = \"${FULL_VERSION}\"" -- crates/agent/Cargo.toml HEAD)

          if [ -n "$VERSION_COMMIT" ]; then
            PATCH=$(git rev-list --count "${VERSION_COMMIT}..HEAD" -- crates/agent/ crates/shared/ crates/agent/Cargo.toml)
          else
            PATCH=$(git rev-list --count HEAD -- crates/agent/ crates/shared/ crates/agent/Cargo.toml)
          fi

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
      - name: Install Rust nightly
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Build agent
        env:
          APP_VERSION_OVERRIDE: ${{ steps.version.outputs.version }}
        run: cargo +nightly build --release -p agent
      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.arch }}
          path: target/release/agent
          retention-days: 1
  docker:
    name: Docker Compose (build + start)
    runs-on: ubuntu-latest
    needs: [build-agent]
    env:
      ASSIMILATE_SECRET_KEY: ci_test_key_not_real
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download agent-x86_64
        uses: actions/download-artifact@v4
        with:
          name: agent-x86_64
          path: agents/x86_64/
      - name: Download agent-aarch64
        uses: actions/download-artifact@v4
        with:
          name: agent-aarch64
          path: agents/aarch64/
      - name: Prepare agent binaries
        run: |
          mv agents/x86_64/agent agents/agent-x86_64
          mv agents/aarch64/agent agents/agent-aarch64
          rm -rf agents/x86_64 agents/aarch64
          chmod +x agents/agent-*
      - name: Build images
        run: docker compose build
      - name: Build agent image
        run: docker buildx build -f Dockerfile.agent .
      - name: Start services
        run: docker compose up -d postgres server
      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose ps --format json | grep -q '"Health":"healthy"'; then
              echo "Postgres healthy"
              break
            fi
            sleep 2
          done
      - name: Check server is running
        run: |
          sleep 5
          docker compose ps
          curl --retry 10 --retry-delay 2 --retry-all-errors -sf http://localhost:8080/ > /dev/null
          echo "Server responding OK"
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
  nightly:
    name: Nightly Docker Publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [rust, frontend, docker, build-agent]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: assimilate
            dockerfile: Dockerfile.server
            runner: ubuntu-latest
            platform: linux/amd64
          - image: assimilate
            dockerfile: Dockerfile.server
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - image: assimilate-agent
            dockerfile: Dockerfile.agent
            runner: ubuntu-latest
            platform: linux/amd64
          - image: assimilate-agent
            dockerfile: Dockerfile.agent
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download agent-x86_64
        if: matrix.dockerfile == 'Dockerfile.server'
        uses: actions/download-artifact@v4
        with:
          name: agent-x86_64
          path: agents/x86_64/
      - name: Download agent-aarch64
        if: matrix.dockerfile == 'Dockerfile.server'
        uses: actions/download-artifact@v4
        with:
          name: agent-aarch64
          path: agents/aarch64/
      - name: Prepare agent binaries
        if: matrix.dockerfile == 'Dockerfile.server'
        run: |
          mv agents/x86_64/agent agents/agent-x86_64
          mv agents/aarch64/agent agents/agent-aarch64
          rm -rf agents/x86_64 agents/aarch64
          chmod +x agents/agent-*
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=nightly,suffix=-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
            type=sha,suffix=-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
      - name: Compute nightly version
        id: version
        run: |
          if [ "${{ matrix.dockerfile }}" = "Dockerfile.server" ]; then
            CRATE="server"
          else
            CRATE="agent"
          fi

          MAJOR=$(grep '^version = ' "crates/${CRATE}/Cargo.toml" | sed 's/.*"\([0-9]*\)\.\([0-9]*\)\.[0-9]*".*/\1/')
          MINOR=$(grep '^version = ' "crates/${CRATE}/Cargo.toml" | sed 's/.*"\([0-9]*\)\.\([0-9]*\)\.[0-9]*".*/\2/')
          FULL_VERSION=$(grep '^version = ' "crates/${CRATE}/Cargo.toml" | sed 's/.*"\(.*\)"/\1/')

          # Find commit where this exact version string was introduced in Cargo.toml
          VC=$(git log -1 --pretty=format:"%H" -S "version = \"${FULL_VERSION}\"" -- "crates/${CRATE}/Cargo.toml" HEAD)

          if [ -n "$VC" ]; then
            PATCH=$(git rev-list --count "${VC}..HEAD" -- "crates/${CRATE}/" "crates/shared/" "crates/${CRATE}/Cargo.toml")
          else
            # Fallback: count all commits touching this crate
            PATCH=$(git rev-list --count HEAD -- "crates/${CRATE}/" "crates/shared/")
          fi

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          build-args: |
            SERVER_VERSION=${{ steps.version.outputs.version }}
            AGENT_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}
          platforms: ${{ matrix.platform }}

  docker-manifest:
    name: Docker Multi-Arch Manifest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [nightly]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [assimilate, assimilate-agent]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create and push manifest (nightly)
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:nightly \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:nightly-amd64 \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:nightly-arm64
      - name: Create and push manifest (sha)
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${SHA} \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${SHA}-amd64 \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:sha-${SHA}-arm64
