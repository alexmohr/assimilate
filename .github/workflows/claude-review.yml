name: Claude PR Review
on:
  pull_request_target:
    types: [labeled]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read
  checks: write
  id-token: write

jobs:
  gate:
    name: Check if a review is actually needed
    runs-on: ubuntu-latest
    # Only ever proceed for: the "needs review" label landing, CI finishing on
    # a PR, or a /claude-review comment from someone with write access (an
    # open author_association check here is an open invitation to burn quota
    # on a public repo).
    if: >-
      (github.event_name == 'pull_request_target' && github.event.label.name == 'needs review') || (github.event_name == 'workflow_run' && github.event.workflow_run.pull_requests[0] != null) || (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
        contains(github.event.comment.body, '/claude-review'))
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check whether the heavy review job is worth starting
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // "needs review" landing and /claude-review are already precise
            // triggers by construction - always proceed for those. "CI
            // completed" fires on every push to every open PR regardless of
            // state, though, so without this check the full job below
            // (checkout, coverage download, possibly Claude) would spin up
            // on every single one, even PRs nowhere near ready for review.
            // Gate it on the PR's current "needs review" label instead.
            if (context.eventName !== "workflow_run") {
              core.setOutput("should_run", "true");
              return;
            }
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const needsReview = pr.labels.some((l) => l.name === "needs review");
            core.setOutput("should_run", needsReview ? "true" : "false");

  review:
    name: Review PR
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # The pre-flight check step below can wait up to 2h for the
    # coverage-diff/duplicate-code check runs to complete - pad well past
    # that so the job itself is never what times out.
    timeout-minutes: 180
    steps:
      - name: Checkout scripts from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts

      - name: Resolve PR and command
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            let number = null;
            if (context.eventName === "workflow_run") {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length > 0) number = prs[0].number;
            } else if (context.eventName === "issue_comment") {
              number = context.payload.issue.number;
            } else {
              number = context.payload.pull_request.number;
            }
            core.setOutput("pr_number", number ?? "");
            core.setOutput("force", context.eventName === "issue_comment" ? "true" : "false");

            const defaultModel = "${{ vars.CLAUDE_REVIEW_MODEL }}" || "claude-sonnet-5";
            if (context.eventName === "issue_comment") {
              const parse = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/parse-review-command.js`);
              await parse({ core, commentBody: context.payload.comment.body, defaultModel });
            } else {
              core.setOutput("matched", "true");
              core.setOutput("model", defaultModel);
            }

      - name: Report unsupported model
        if: steps.resolve.outputs.error
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.resolve.outputs.pr_number }}"),
              body: "${{ steps.resolve.outputs.error }}",
            });

      - name: Resolve PR head
        id: head
        if: steps.resolve.outputs.pr_number != '' && steps.resolve.outputs.matched == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number("${{ steps.resolve.outputs.pr_number }}"),
            });
            core.setOutput("sha", pr.head.sha);

      - name: Run deterministic pre-flight checks
        id: precheck
        if: steps.head.outputs.sha
        uses: actions/github-script@v7
        with:
          script: |
            const check = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/pre-review-checks.js`);
            await check({
              github,
              context,
              core,
              prNumber: Number("${{ steps.resolve.outputs.pr_number }}"),
              headSha: "${{ steps.head.outputs.sha }}",
              force: "${{ steps.resolve.outputs.force }}" === "true",
            });

      # NOTE: claude-code-action's exact input names (claude_code_oauth_token,
      # model, direct_prompt) are best-effort from documented usage and were
      # not independently verified in this session - confirm against the
      # action's current README on the first live run and adjust if needed.
      - name: Run Claude review
        id: claude
        if: steps.precheck.outputs.run_claude == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: ${{ steps.resolve.outputs.model }}
          direct_prompt: |
            Follow skills/review/SKILL.md to review pull request #${{ steps.resolve.outputs.pr_number }}
            at commit ${{ steps.head.outputs.sha }}.

            Deterministic pre-flight checks (CI status, merge conflicts, coverage-diff,
            duplicate-code detection) have already run and passed - do not re-derive them.
            Coverage-diff and duplicate-code detection each run in their own standalone
            workflow (.github/workflows/coverage-diff-check.yml,
            .github/workflows/duplicate-code-check.yml) and post their own PR comments
            (the latter with the actual duplicated code) when they fail - trust those
            verdicts rather than re-scanning for either from scratch. Focus your review on
            correctness, logic duplication beyond what that scan already covers, and
            whether the tests that exist are the right *kind* of test for the change, not
            raw line coverage.

            Rebase-behind-main and issue-linking findings, if the pre-flight comment has any,
            are informational only - mention them if relevant but don't block on them alone.

            Submit your verdict per the account rule in skills/review/SKILL.md: native
            approve/request-changes if you're reviewing a different account's PR, or the
            claude-approved/claude-changes-requested labels if reviewing your own account's PR.

      - name: Report unavailable automated review
        if: steps.precheck.outputs.run_claude == 'true' && steps.claude.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.resolve.outputs.pr_number }}"),
              body:
                "Automated review via Claude was unavailable this run (quota exhausted or an error). " +
                "This PR still needs review - a human can review it directly on GitHub, or any agent " +
                "can review it per `skills/review/SKILL.md`. Comment `/claude-review` to retry once " +
                "the automated path is available again.",
            });

      # Belt-and-suspenders: re-sync immediately after Claude's turn (not
      # waiting on whatever trigger fires next). pre-review-checks.js already
      # waited for both pre-flight stages' check runs to conclude before
      # invoking Claude, so this isn't guarding against those - it's for a
      # new push landing on this PR while Claude's own review is still in
      # progress, which starts fresh coverage-diff/duplicate-code runs for
      # the new commit. sync-pr-labels.js unconditionally strips
      # claude-approved whenever a pre-flight stage is currently failing -
      # see the comment there. This makes that guarantee immediate rather
      # than dependent on the next unrelated trigger.
      - name: Re-sync labels after Claude review
        if: steps.precheck.outputs.run_claude == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sync = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/sync-pr-labels.js`);
            // No eventAction: this isn't a new push, so the synchronize-only
            // stale-clear (which would wipe the verdict Claude just set)
            // must not fire here - only the unconditional
            // pre-flight-stage-failed guard should apply.
            await sync({
              github,
              context,
              core,
              prNumber: Number("${{ steps.resolve.outputs.pr_number }}"),
            });
