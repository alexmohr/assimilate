name: PR Status Labels
on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  sync-labels:
    name: Sync PR status labels
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' || github.event.workflow_run.pull_requests[0] != null
    steps:
      - name: Checkout scripts from default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          sparse-checkout: |
            .github/scripts
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let number = null;
            if (context.eventName === "workflow_run") {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length > 0) number = prs[0].number;
            } else {
              number = context.payload.pull_request.number;
            }
            core.setOutput("number", number ?? "");
      - name: Sync labels
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const sync = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/sync-pr-labels.js`);
            await sync({ github, context, core, prNumber: Number("${{ steps.pr.outputs.number }}") });
