#
# Overlay for coverage-instrumented e2e runs.
# 1. Mounts a locally-built (Istanbul-instrumented) frontend dist directory over
#    the image's /app/static so Playwright tests hit instrumented code.
# 2. Rebuilds the demo service with coverage-instrumented server and agent binaries
#    (COVERAGE=true build arg to Dockerfile.demo).
# 3. Mounts a .coverage directory to capture LLVM profraw files from the server
#    and agent processes for backend code coverage.
#
# Usage (from repo root):
#   VITE_COVERAGE=true npm --prefix frontend run build
#   mkdir -p .coverage
#   docker compose \
#     -f .devcontainer/demo/docker-compose.demo.yml \
#     -f .devcontainer/demo/docker-compose.coverage-override.yml \
#     up -d

services:
  demo:
    # Distinct tag: this image carries the coverage-instrumented server binary,
    # so it must not collide with the non-instrumented assimilate-demo:local
    # image used by the agent/placeholder services.
    image: assimilate-demo:coverage
    build:
      args:
        COVERAGE: "true"
    volumes:
      - ../../frontend/dist:/app/static:ro
      - ../../.coverage:/tmp/coverage
    environment:
      LLVM_PROFILE_FILE: /tmp/coverage/server.profraw

  web-server-01:
    image: assimilate-demo:coverage
    volumes:
      - ../../.coverage:/tmp/coverage
    environment:
      LLVM_PROFILE_FILE: /tmp/coverage/agent-web-server-01.profraw
      # Shortened from the 30s production default so a killed borg process's
      # SIGKILL-escalation path reliably completes (and gets recorded as covered)
      # well before docker compose's own 30s stop --timeout forces the container down.
      BORG_KILL_ESCALATION_SECS: "2"

  db-server-01:
    image: assimilate-demo:coverage
    volumes:
      - ../../.coverage:/tmp/coverage
    environment:
      LLVM_PROFILE_FILE: /tmp/coverage/agent-db-server-01.profraw
      BORG_KILL_ESCALATION_SECS: "2"

  media-store-01:
    image: assimilate-demo:coverage
    volumes:
      - ../../.coverage:/tmp/coverage
    environment:
      LLVM_PROFILE_FILE: /tmp/coverage/agent-media-store-01.profraw
      BORG_KILL_ESCALATION_SECS: "2"
